<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="nBridge logo">
  <defs>
    <linearGradient id="nb-g" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.55" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#nb-g)"/>
  <!-- bridge deck -->
  <path d="M22 86 H106" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <!-- suspension arc -->
  <path d="M28 86 C 40 48, 88 48, 100 86" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
  <!-- hangers -->
  <path d="M44 66 V82 M64 60 V82 M84 66 V82" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <!-- message dots crossing the bridge -->
  <circle cx="36" cy="100" r="5" fill="#fff" opacity="0.9"/>
  <circle cx="64" cy="100" r="5" fill="#fff" opacity="0.6"/>
  <circle cx="92" cy="100" r="5" fill="#fff" opacity="0.35"/>
</svg>
